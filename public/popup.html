<!DOCTYPE html>

<html lang="en">
	<head>
			<meta charset="UTF-8">
			<title>Blossom - Habit Tracker</title>
			<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0" />
			<link rel="stylesheet" href="popup.css" />
	</head>
	<body>
		<div class="app">
			<button id="settingsButton" class="settings-button" type="button" aria-label="Blocked domains">
				<span class="material-symbols-rounded settings-button__icon" aria-hidden="true">block</span>
			</button>
			<button id="coinButton" class="coin-button" type="button" aria-label="Coins">
				<img src="coin.png" alt="Coin" class="coin-button__icon" />
				<span class="coin-button__count">42</span>
			</button>

			<section id="shopPane" class="shop-pane" hidden>
				<h2 class="shop-pane__title">Garden Shop</h2>
				<p class="shop-pane__subtitle">Unlock new tree types to plant in focus sessions.</p>
				<div id="shopItems" class="shop-pane__items"></div>
				<p id="shopStatus" class="shop-pane__status"></p>
			</section>

			<section id="domainsPane" class="domains-pane" hidden>
				<h2 class="domains-pane__title">Blocked domains</h2>
				<form id="domainForm" class="domains-pane__form">
					<input id="domainInput" class="domains-pane__input" type="text" placeholder="example.com" autocomplete="off" />
					<button class="domains-pane__add" type="submit">Add</button>
				</form>
				<ul id="domainsList" class="domains-pane__list"></ul>
			</section>

			<h1 class="title is-3">Blossom</h1>
			<p class="subtitle">Grow your garden while you focus.</p>

			<button id="timerButton" class="button is-primary mb-4">Click to start timer</button>
			<h1 class="subtitle is-1" id="timerDisplay"></h1>

			<section class="garden" aria-label="Garden progress">
				<div id="gardenPlot" class="garden__plot">
					<img src="garden plot.png" alt="Garden plot" class="garden__plot-image" />
					<div id="gardenTrees" class="garden__trees" aria-hidden="true"></div>
				</div>
				<div class="garden__planting-row">
					<label class="garden__planting-label" for="treeTypeSelect">Tree type</label>
					<select id="treeTypeSelect" class="garden__tree-select"></select>
				</div>
				<p id="plantingHint" class="garden__hint">Click start timer, then click the plot to plant.</p>
				<p id="gardenStatus" class="garden__status">Stage 1 of 5</p>
			</section>
		</div>

		<script src="popup.js"></script>
	</body>
</html>
